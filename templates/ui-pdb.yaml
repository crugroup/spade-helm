{{- if .Values.spadeUI.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ template "spade.name" . }}-ui-pdb
spec:
  {{- toYaml .Values.spadeUI.podDisruptionBudget.config | nindent 2 }}
  selector:
    matchLabels:
      component: spade-ui
{{- end }}
